# CPU-only profile — visible to all users globally (redhat-ods-applications namespace)
# Eve (analytics) and any user in any project can see this profile
apiVersion: infrastructure.opendatahub.io/v1
kind: HardwareProfile
metadata:
  name: cpu-only
  namespace: redhat-ods-applications
spec:
  displayName: "CPU Only"
  description: "Standard CPU compute. No GPU access. Suitable for data preparation, analytics, and light ML workloads."
  enabled: true
  identifiers:
    - displayName: "CPU"
      identifier: "cpu"
      minCount: "1"
      maxCount: "8"
      defaultCount: "2"
    - displayName: "Memory"
      identifier: "memory"
      minCount: "2Gi"
      maxCount: "32Gi"
      defaultCount: "4Gi"
