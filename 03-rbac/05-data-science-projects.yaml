# GPUaaS Demo Tenants — 5 projects representing different business units
# Each project maps to a Kueue LocalQueue and specific GPU access tier
apiVersion: v1
kind: Namespace
metadata:
  name: inference-team-project
  labels:
    opendatahub.io/dashboard: "true"
    kubernetes.io/metadata.name: inference-team-project
  annotations:
    openshift.io/display-name: "Inference Team — Production GPU"
    openshift.io/description: "Production inference workloads. Full A30 dedicated GPU access. High-priority queue."
---
apiVersion: v1
kind: Namespace
metadata:
  name: ds-team-project
  labels:
    opendatahub.io/dashboard: "true"
    kubernetes.io/metadata.name: ds-team-project
  annotations:
    openshift.io/display-name: "Data Science Team — Shared GPU"
    openshift.io/description: "Model development and experimentation. Time-sliced A30. Medium-priority queue."
---
apiVersion: v1
kind: Namespace
metadata:
  name: research-team-project
  labels:
    opendatahub.io/dashboard: "true"
    kubernetes.io/metadata.name: research-team-project
  annotations:
    openshift.io/display-name: "Research Team — MIG Small Slices"
    openshift.io/description: "Research experiments using A30 MIG 1g.6gb or 2g.12gb slices. Low-priority queue."
---
apiVersion: v1
kind: Namespace
metadata:
  name: finetune-team-project
  labels:
    opendatahub.io/dashboard: "true"
    kubernetes.io/metadata.name: finetune-team-project
  annotations:
    openshift.io/display-name: "Fine-tuning Team — Large MIG Slice"
    openshift.io/description: "LLM fine-tuning jobs using A30 MIG 4g.24gb (full A30 in MIG mode). Medium-priority queue."
---
apiVersion: v1
kind: Namespace
metadata:
  name: analytics-project
  labels:
    opendatahub.io/dashboard: "true"
    kubernetes.io/metadata.name: analytics-project
  annotations:
    openshift.io/display-name: "Analytics Team — CPU Only"
    openshift.io/description: "Business analytics workloads. CPU-only access. No GPU quota."
