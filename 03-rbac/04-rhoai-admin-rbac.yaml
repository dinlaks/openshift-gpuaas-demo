apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gpuaas-platform-admin
rules:
  - apiGroups: ["datasciencecluster.opendatahub.io"]
    resources: ["datascienceclusters"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["dscinitialization.opendatahub.io"]
    resources: ["dscinitializations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["infrastructure.opendatahub.io"]
    resources: ["hardwareprofiles"]
    verbs: ["*"]
  - apiGroups: ["kueue.x-k8s.io"]
    resources: ["clusterqueues", "resourceflavors", "workloadpriorityclasses"]
    verbs: ["*"]
  - apiGroups: ["nvidia.com"]
    resources: ["clusterpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
# gpuaas-platform-admins gets full cluster-admin — they are the platform team
# responsible for managing the entire OpenShift + RHOAI + Kueue stack
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gpuaas-platform-admin-binding
subjects:
  - kind: Group
    name: gpuaas-platform-admins
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
# Note: RHOAI dashboard admin access also controlled via Auth CR — see 07-rhoai-auth-groups.yaml
