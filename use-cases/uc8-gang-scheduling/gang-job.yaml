---
# ── Step 2: The gang-scheduled training job — needs 4x mig-1g.6gb simultaneously ──
# parallelism=4 tells Kueue this is a 4-pod gang (minCount=4).
# Kueue will NOT start ANY pod until all 4 can be admitted together.
# With 3 medium-priority fillers holding 3/4 slots: this stays Inadmissible.
# Delete all 3 fillers → 4 free → Kueue starts all 4 pods at the same second.
apiVersion: batch/v1
kind: Job
metadata:
  name: distributed-training-gang
  namespace: research-team-project
  labels:
    demo/uc: uc8-gang
    demo/role: gang-job
    kueue.x-k8s.io/queue-name: research-queue
    kueue.x-k8s.io/priority-class: medium-priority
spec:
  parallelism: 4       # Kueue treats all 4 pods as an atomic unit (minCount=4)
  completions: 4
  completionMode: Indexed
  template:
    metadata:
      labels:
        demo/uc: uc8-gang
        demo/role: gang-worker
        kueue.x-k8s.io/queue-name: research-queue
        kueue.x-k8s.io/priority-class: medium-priority
    spec:
      restartPolicy: Never
      containers:
        - name: training-worker
          image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
          command: [python, -u, -c]
          args:
            - |
              import torch, time, os, socket
              rank = int(os.getenv('JOB_COMPLETION_INDEX', '0'))
              world_size = 4
              hostname = socket.gethostname()
              gpu = torch.cuda.get_device_name(0)
              mem = torch.cuda.get_device_properties(0).total_memory / 1e9
              print("=" * 60)
              print(f"UC8: GANG SCHEDULING — ATOMIC DISTRIBUTED TRAINING")
              print("=" * 60)
              print(f"Worker rank     : {rank}/{world_size}")
              print(f"Node            : {hostname}")
              print(f"GPU             : {gpu}")
              print(f"VRAM            : {mem:.1f} GB")
              print(f"Gang guarantee  : All {world_size} workers started SIMULTANEOUSLY")
              print("=" * 60)
              # Simulate distributed training workload
              x = torch.randn(2048, 2048, device='cuda')
              for step in range(50):
                  grad = torch.mm(x, x.T)
                  x = x - 0.01 * grad[:2048, :2048]
                  if step % 10 == 0:
                      print(f"[Worker {rank}] Training step {step}/50")
                  time.sleep(2)
              print(f"[Worker {rank}] Training complete — no deadlock possible!")
          resources:
            requests:
              ${MIG_SMALL_RESOURCE}: "1"
            limits:
              ${MIG_SMALL_RESOURCE}: "1"
