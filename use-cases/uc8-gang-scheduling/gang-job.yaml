# UC8: Gang Scheduling — All GPUs Must Start Together
#
# Demo flow:
#   Step 1: Occupy 3 of the 4 available mig-1g.6gb slices with medium-priority filler jobs
#           (fillers are medium-priority = same as gang → Kueue will NOT auto-preempt them)
#   Step 2: Submit the gang job requesting 4x mig-1g.6gb simultaneously
#           → gang stays Inadmissible (only 1 slot free, needs 4 — atomic)
#   Step 3: Show the gang job is Inadmissible — zero pods created
#   Step 4: Delete all 3 fillers simultaneously → 4 slots free
#           → Kueue admits ALL 4 gang pods at the exact same moment [the dramatic reveal]
#
# Why same-priority fillers? research-cluster-queue has withinClusterQueue: LowerPriority.
# Low-priority fillers would be auto-preempted immediately when the gang job arrives —
# there would be no "Inadmissible" state to show the audience. Using medium-priority
# fillers preserves the dramatic wait: gang stays inadmissible until we manually free 4 slots.
#
# Key message: "No partial start. 4 GPUs or nothing. Kueue enforces atomicity."
#
# Watch gang scheduling:
#   oc get workloads -n research-team-project -w
#   oc get pods -n research-team-project -l demo/uc=uc8-gang -w

# ── Step 1: Occupy 3 slices with medium-priority filler jobs ──────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: filler-job-1
  namespace: research-team-project
  labels:
    demo/uc: uc8-gang
    demo/role: filler
    kueue.x-k8s.io/queue-name: research-queue
    kueue.x-k8s.io/priority-class: medium-priority
spec:
  parallelism: 1
  completions: 1
  template:
    metadata:
      labels:
        demo/uc: uc8-gang
        demo/role: filler
        kueue.x-k8s.io/queue-name: research-queue
        kueue.x-k8s.io/priority-class: medium-priority
    spec:
      restartPolicy: Never
      containers:
        - name: filler
          image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
          command: [python, -c, "import time; print('Filler 1 holding GPU slice'); time.sleep(3600)"]  # holds slot for demo
          resources:
            requests:
              ${MIG_SMALL_RESOURCE}: "1"
            limits:
              ${MIG_SMALL_RESOURCE}: "1"
