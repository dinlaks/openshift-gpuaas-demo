# UC4: Queue-Based Scheduling — fill jobs (jobs 1-4)
#
# research-cluster-queue: nominalQuota=1, borrowingLimit=3 → charlie can use 4 slices total
#
# Demo flow:
#   Step 1: Apply this file — 4 jobs, all admitted
#           Job 1: uses charlie's own nominalQuota (1 slice)
#           Jobs 2-4: borrow from idle inference + ds queues (3 slices)
#           → all 4 physical MIG slices now in use
#   Step 2: Apply 05-queue-demo-jobs-overflow.yaml — 5th job goes Inadmissible
#           (borrowingLimit=3 exhausted AND no physical capacity left)
#   Step 3: Delete one running job — Kueue auto-admits the queued 5th job
#   Key message: "Jobs wait intelligently — not fail. Platform manages the queue."
#
# NOTE: kueue.x-k8s.io/queue-name must be in Pod template LABELS (not Job annotations)
#       Red Hat Kueue uses Pod integration.

apiVersion: batch/v1
kind: Job
metadata:
  name: charlie-research-queue-1
  namespace: research-team-project
  labels:
    demo/uc: uc4-queue-scheduling
    kueue.x-k8s.io/queue-name: research-queue
spec:
  parallelism: 1
  completions: 1
  template:
    metadata:
      labels:
        demo/uc: uc4-queue-scheduling
        kueue.x-k8s.io/queue-name: research-queue
    spec:
      restartPolicy: Never
      containers:
        - name: gpu-workload
          image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
          command: [python, -c]
          args:
            - |
              import torch, time, socket
              mem = torch.cuda.get_device_properties(0).total_memory / 1e9
              print(f"Job 1 | Node: {socket.gethostname()} | GPU: {torch.cuda.get_device_name(0)} | VRAM: {mem:.1f}GB")
              x = torch.randn(1024, 1024, device='cuda')
              for i in range(360):  # 30 min hold
                  _ = torch.mm(x, x)
                  time.sleep(5)
          resources:
            requests:
              ${MIG_SMALL_RESOURCE}: "1"
            limits:
              ${MIG_SMALL_RESOURCE}: "1"
