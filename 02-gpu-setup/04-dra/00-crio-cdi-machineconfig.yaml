# CRI-O CDI MachineConfig — prerequisite for DRA device injection
#
# Why this is needed:
#   OCP 4.21 ships with cdi_spec_dirs commented out in /etc/crio/crio.conf.
#   Without it, CRI-O cannot read claim-specific CDI spec files written by the
#   NVIDIA DRA driver during NodePrepareResources. Pods get scheduled and
#   ResourceClaims are allocated, but the GPU is not injected into the container
#   (CUDA_VISIBLE_DEVICES unset, container sees all GPUs or none).
#
#   This MachineConfig adds /etc/crio/crio.conf.d/99-cdi.conf which enables
#   CDI spec directory scanning for /etc/cdi and /var/run/cdi.
#
# Effect:
#   The MCO will drain and reboot the node (~10-15 min on SNO). After reboot,
#   CRI-O will scan /var/run/cdi/ for CDI spec files written by the DRA driver,
#   and correctly inject only the allocated GPU/MIG device into each container.
#
# Applies to: Cluster A only (master MachineConfigPool — SNO has one node with master+worker roles)
# Must be applied BEFORE deploy-dra.sh (or deploy-dra.sh will apply it automatically).
#
# Verify after reboot:
#   oc debug node/<node> -- chroot /host grep cdi_spec /etc/crio/crio.conf.d/99-cdi.conf
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: master
  name: 99-crio-enable-cdi
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
        - path: /etc/crio/crio.conf.d/99-cdi.conf
          mode: 0644
          overwrite: true
          contents:
            source: data:text/plain;charset=utf-8;base64,W2NyaW8ucnVudGltZV0KY2RpX3NwZWNfZGlycyA9IFsiL2V0Yy9jZGkiLCAiL3Zhci9ydW4vY2RpIl0K
