# Validation job — confirms 2g.12gb MIG slices are working on A30
apiVersion: batch/v1
kind: Job
metadata:
  name: validate-mig-2g12gb
  namespace: inference-team-project
  labels:
    demo/purpose: validation
    kueue.x-k8s.io/queue-name: inference-queue
spec:
  parallelism: 1
  completions: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: gpu-validation
          image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
          command: [python, -c]
          args:
            - |
              import torch
              assert torch.cuda.is_available(), "CUDA not available!"
              name = torch.cuda.get_device_name(0)
              mem  = torch.cuda.get_device_properties(0).total_memory / 1e9
              print(f"[PASS] GPU detected  : {name}")
              print(f"[PASS] VRAM          : {mem:.1f} GB")
              assert mem > 10 and mem < 14, f"Expected ~12GB for 2g.12gb slice, got {mem:.1f}GB"
              print(f"[PASS] Memory within expected range for 2g.12gb MIG slice")
              x = torch.randn(2048, 2048, device='cuda')
              y = torch.mm(x, x)
              print(f"[PASS] Matrix multiply: OK (result shape {y.shape})")
              print("=== 2g.12gb MIG slice validation PASSED ===")
          resources:
            requests:
              nvidia.com/mig-2g.12gb: "1"
            limits:
              nvidia.com/mig-2g.12gb: "1"
