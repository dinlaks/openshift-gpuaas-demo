# Time-Slicing Demo Jobs — 3 concurrent inference jobs on shared GPU 1
# All 3 run simultaneously on the same A30, proving time-slicing is active.
# Each sees the full GPU memory (24GB) — time-slicing shares compute time, not memory.
#
# Start at the BEGINNING of the timeslicing scenario (image pull takes ~30s).
# Pods will be Running by the time you finish the capacity walkthrough.
#
# Apply:  oc apply -f 03-gpu-management/05-timeslicing/inference-job-timesliced.yaml
# Watch:  oc get pods -n ds-team-project -l demo/scenario=timeslicing -w
# Logs:   oc logs -n ds-team-project -l demo/scenario=timeslicing --prefix --follow --tail=5
# Clean:  oc delete -f 03-gpu-management/05-timeslicing/inference-job-timesliced.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: timeslice-inference
  namespace: gpu-premium-project
  labels:
    demo/scenario: timeslicing
    demo/uc: uc-timeslice
spec:
  parallelism: 3
  completions: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        demo/scenario: timeslicing
        demo/uc: uc-timeslice
    spec:
      restartPolicy: Never
      nodeSelector:
        demo/gpu-gpu1-mode: full
      containers:
        - name: inference
          image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
          command: [python, -u, -c]
          args:
            - |
              import torch, time, os, socket

              if not torch.cuda.is_available():
                  raise RuntimeError("No GPU available")

              pod = socket.gethostname()
              gpu = torch.cuda.get_device_name(0)
              mem = torch.cuda.get_device_properties(0).total_memory / 1e9
              duration = int(os.environ.get("JOB_DURATION_SECS", "1800"))

              print(f"[{pod}] GPU: {gpu} | Memory: {mem:.1f}GB | Sharing via time-slicing")

              size = 4096
              a = torch.randn(size, size, device="cuda")
              b = torch.randn(size, size, device="cuda")

              start = time.time()
              iteration = 0
              while time.time() - start < duration:
                  c = torch.matmul(a, b)
                  iteration += 1
                  if iteration % 100 == 0:
                      elapsed = time.time() - start
                      tflops = 2 * size**3 * iteration / elapsed / 1e12
                      used_gb = torch.cuda.memory_allocated() / 1e9
                      print(f"[{pod}] {elapsed:.0f}s | {tflops:.2f} TFLOPS | mem={used_gb:.2f}GB")
              print(f"[{pod}] Done — {iteration} iterations")
          env:
            - name: JOB_DURATION_SECS
              value: "1800"
          resources:
            requests:
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
