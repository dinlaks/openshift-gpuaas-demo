# GPU Time-Slicing Configuration
# Enables 4 virtual GPUs from a full (non-MIG) GPU
# GPU 0 remains in MIG mode — time-slicing only applies to GPU 1 (nvidia.com/gpu)
#
# Time-slicing vs MIG:
#   Time-slicing: Multiple pods share GPU compute time (no memory isolation)
#   MIG:          Hardware partitioning — each pod gets guaranteed memory + SMs
#
# Apply: included in configure-timeslicing.sh
# Teardown: included in teardown-timeslicing.sh
apiVersion: v1
kind: ConfigMap
metadata:
  name: device-plugin-config
  namespace: nvidia-gpu-operator
data:
  a30-timeslice: |
    version: v1
    sharing:
      timeSlicing:
        renameByDefault: false
        failRequestsGreaterThanOne: false
        resources:
          - name: nvidia.com/gpu
            replicas: 4
