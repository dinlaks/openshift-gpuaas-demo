# MIG partition profiles — applied by nvidia-mig-manager when a node is labelled
# nvidia.com/mig.config=<profile-name>.
#
# Profiles are organised by role:
#   small      → all GPUs: uniform small MIG slices (works with 1+ GPUs)
#   large      → all GPUs: uniform large MIG slices (works with 1+ GPUs)
#   dedicated  → all GPUs: full GPU, no MIG        (works with 1+ GPUs)
#   mixed      → GPU[0]: small slices, GPU[1]: small+large MIG  (requires 2 GPUs)
#   full-combo → GPU[0]: small MIG slices, GPU[1]: full non-MIG (requires 2 GPUs)
#
# Reference: https://github.com/NVIDIA/mig-parted/tree/main/examples

apiVersion: v1
kind: ConfigMap
metadata:
  name: mig-parted-config
  namespace: nvidia-gpu-operator
data:
  config.yaml: |
    version: v1
    mig-configs:

      # ── Dedicated (no MIG — full GPU on all devices) ───────────────────────
      # Works with any GPU type and any number of GPUs per node.
      dedicated:
        - devices: all
          mig-enabled: false

      # ════════════════════════════════════════════════════════════════════════
      # NVIDIA A30 (24 GB, Ampere)
      # ════════════════════════════════════════════════════════════════════════

      # small: 4× 1g.6gb per GPU
      all-1g.6gb:
        - devices: all
          mig-enabled: true
          mig-devices:
            1g.6gb: 4

      # large: 2× 2g.12gb per GPU
      all-2g.12gb:
        - devices: all
          mig-enabled: true
          mig-devices:
            2g.12gb: 2

      # mixed: GPU[0]=4×1g.6gb, GPU[1]=1×2g.12gb+2×1g.6gb  (2 GPUs required)
      mixed-a30:
        - devices: [0]
          mig-enabled: true
          mig-devices:
            1g.6gb: 4
        - devices: [1]
          mig-enabled: true
          mig-devices:
            2g.12gb: 1
            1g.6gb:  2

      # full-combo: GPU[0]=4×1g.6gb MIG, GPU[1]=full GPU  (2 GPUs required)
      full-combo-a30:
        - devices: [0]
          mig-enabled: true
          mig-devices:
            1g.6gb: 4
        - devices: [1]
          mig-enabled: false

      # ════════════════════════════════════════════════════════════════════════
      # NVIDIA A100 40 GB (Ampere)
      # ════════════════════════════════════════════════════════════════════════

      # small: 7× 1g.5gb per GPU
      all-1g.5gb:
        - devices: all
          mig-enabled: true
          mig-devices:
            1g.5gb: 7

      # large: 3× 2g.10gb per GPU
      all-2g.10gb:
        - devices: all
          mig-enabled: true
          mig-devices:
            2g.10gb: 3

      # mixed: GPU[0]=7×1g.5gb, GPU[1]=1×2g.10gb+5×1g.5gb  (2 GPUs required)
      mixed-a100-40gb:
        - devices: [0]
          mig-enabled: true
          mig-devices:
            1g.5gb: 7
        - devices: [1]
          mig-enabled: true
          mig-devices:
            2g.10gb: 1
            1g.5gb:  5

      # full-combo: GPU[0]=7×1g.5gb MIG, GPU[1]=full GPU  (2 GPUs required)
      full-combo-a100-40gb:
        - devices: [0]
          mig-enabled: true
          mig-devices:
            1g.5gb: 7
        - devices: [1]
          mig-enabled: false

      # ════════════════════════════════════════════════════════════════════════
      # NVIDIA A100 80 GB (Ampere)
      # ════════════════════════════════════════════════════════════════════════

      # small: 7× 1g.10gb per GPU
      all-1g.10gb:
        - devices: all
          mig-enabled: true
          mig-devices:
            1g.10gb: 7

      # large: 3× 2g.20gb per GPU
      all-2g.20gb:
        - devices: all
          mig-enabled: true
          mig-devices:
            2g.20gb: 3

      # mixed: GPU[0]=7×1g.10gb, GPU[1]=1×2g.20gb+5×1g.10gb  (2 GPUs required)
      mixed-a100-80gb:
        - devices: [0]
          mig-enabled: true
          mig-devices:
            1g.10gb: 7
        - devices: [1]
          mig-enabled: true
          mig-devices:
            2g.20gb: 1
            1g.10gb: 5

      # full-combo: GPU[0]=7×1g.10gb MIG, GPU[1]=full GPU  (2 GPUs required)
      full-combo-a100-80gb:
        - devices: [0]
          mig-enabled: true
          mig-devices:
            1g.10gb: 7
        - devices: [1]
          mig-enabled: false

      # ════════════════════════════════════════════════════════════════════════
      # NVIDIA H100 SXM5/PCIe 80 GB (Hopper)
      # ════════════════════════════════════════════════════════════════════════

      # small: 7× 1g.10gb per GPU  (shared profile name with A100-80GB)
      # all-1g.10gb already defined above

      # large: 2× 3g.40gb per GPU
      all-3g.40gb:
        - devices: all
          mig-enabled: true
          mig-devices:
            3g.40gb: 2

      # mixed: GPU[0]=7×1g.10gb, GPU[1]=1×3g.40gb+4×1g.10gb  (2 GPUs required)
      mixed-h100-80gb:
        - devices: [0]
          mig-enabled: true
          mig-devices:
            1g.10gb: 7
        - devices: [1]
          mig-enabled: true
          mig-devices:
            3g.40gb: 1
            1g.10gb: 4

      # full-combo: GPU[0]=7×1g.10gb MIG, GPU[1]=full GPU  (2 GPUs required)
      full-combo-h100-80gb:
        - devices: [0]
          mig-enabled: true
          mig-devices:
            1g.10gb: 7
        - devices: [1]
          mig-enabled: false

      # ════════════════════════════════════════════════════════════════════════
      # NVIDIA H100 NVL (94 GB, Hopper)
      # ════════════════════════════════════════════════════════════════════════

      # small: 7× 1g.12gb per GPU
      all-1g.12gb:
        - devices: all
          mig-enabled: true
          mig-devices:
            1g.12gb: 7

      # large: 2× 3g.47gb per GPU
      all-3g.47gb:
        - devices: all
          mig-enabled: true
          mig-devices:
            3g.47gb: 2

      # mixed: GPU[0]=7×1g.12gb, GPU[1]=1×3g.47gb+4×1g.12gb  (2 GPUs required)
      mixed-h100-nvl:
        - devices: [0]
          mig-enabled: true
          mig-devices:
            1g.12gb: 7
        - devices: [1]
          mig-enabled: true
          mig-devices:
            3g.47gb: 1
            1g.12gb: 4

      # full-combo: GPU[0]=7×1g.12gb MIG, GPU[1]=full GPU  (2 GPUs required)
      full-combo-h100-nvl:
        - devices: [0]
          mig-enabled: true
          mig-devices:
            1g.12gb: 7
        - devices: [1]
          mig-enabled: false

      # ════════════════════════════════════════════════════════════════════════
      # NVIDIA H200 SXM5 (141 GB, Hopper)
      # ════════════════════════════════════════════════════════════════════════

      # small: 7× 1g.18gb per GPU
      all-1g.18gb:
        - devices: all
          mig-enabled: true
          mig-devices:
            1g.18gb: 7

      # large: 3× 2g.35gb per GPU
      all-2g.35gb:
        - devices: all
          mig-enabled: true
          mig-devices:
            2g.35gb: 3

      # mixed: GPU[0]=7×1g.18gb, GPU[1]=1×2g.35gb+5×1g.18gb  (2 GPUs required)
      mixed-h200:
        - devices: [0]
          mig-enabled: true
          mig-devices:
            1g.18gb: 7
        - devices: [1]
          mig-enabled: true
          mig-devices:
            2g.35gb: 1
            1g.18gb: 5

      # full-combo: GPU[0]=7×1g.18gb MIG, GPU[1]=full GPU  (2 GPUs required)
      full-combo-h200:
        - devices: [0]
          mig-enabled: true
          mig-devices:
            1g.18gb: 7
        - devices: [1]
          mig-enabled: false
