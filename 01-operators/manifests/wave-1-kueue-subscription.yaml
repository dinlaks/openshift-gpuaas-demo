# Wave 1 — Red Hat build of Kueue Operator
# Manages GPU quota and fairness across all team queues.
# kueue: Unmanaged must be set in DataScienceCluster so RHOAI does not conflict.
---
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-kueue-operator
  labels:
    openshift.io/cluster-monitoring: "true"

---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-kueue-operator
  namespace: openshift-kueue-operator
spec: {}

---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: openshift-kueue-operator
  namespace: openshift-kueue-operator
spec:
  channel: ${KUEUE_CHANNEL}
  installPlanApproval: Automatic
  name: kueue-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
