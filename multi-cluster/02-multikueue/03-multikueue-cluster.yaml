# MultiKueueCluster — represents Cluster B to the Kueue hub on Cluster A
# Kueue uses the kubeconfig secret to monitor Cluster B's capacity and dispatch jobs.
# v1beta2: spec.clusterSource.kubeConfig replaces the old v1alpha1 spec.kubeConfig
apiVersion: kueue.x-k8s.io/v1beta2
kind: MultiKueueCluster
metadata:
  name: ${CLUSTER_B_NAME}
spec:
  clusterSource:
    kubeConfig:
      locationType: Secret
      location: multikueue-${CLUSTER_B_NAME}-kubeconfig
