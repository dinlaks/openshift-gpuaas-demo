# ACM ManagedServiceAccount — the bridge between ACM and Kueue MultiKueue
#
# ACM creates this SA on cluster-b AND syncs its token back to the Hub as a Secret.
# This means:
#   - No manual token generation
#   - No context switching to Cluster B
#   - Token auto-rotated by ACM (no expiry surprises)
#   - When you add cluster-c to ACM, create a ManagedServiceAccount for cluster-c
#     → it automatically joins the Kueue pool too
#
# The synced Secret appears at: namespace=cluster-b, name=multikueue-worker on Hub
apiVersion: authentication.open-cluster-management.io/v1alpha1
kind: ManagedServiceAccount
metadata:
  name: multikueue-worker
  namespace: cluster-b    # Hub namespace = target ManagedCluster name
spec:
  rotation:
    enabled: true
    validity: 8760h       # rotate token every year; ACM syncs new token automatically
---
# ClusterRoleBinding for the SA — applied on cluster-b via ACM ManifestWork
# (ACM GPU Policy in 08-acm-gpu-policy.yaml already handles the ClusterRoleBinding,
#  but this ManifestWork ensures it exists even before the policy propagates)
apiVersion: work.open-cluster-management.io/v1
kind: ManifestWork
metadata:
  name: multikueue-worker-rbac
  namespace: cluster-b
spec:
  workload:
    manifests:
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: multikueue-worker-admin
        subjects:
          - kind: ServiceAccount
            name: multikueue-worker
            namespace: open-cluster-management-agent-addon
        roleRef:
          kind: ClusterRole
          name: cluster-admin
          apiGroup: rbac.authorization.k8s.io
