# ManagedCluster — registers Cluster B into ACM Hub
apiVersion: cluster.open-cluster-management.io/v1
kind: ManagedCluster
metadata:
  name: cluster-b
  labels:
    cluster.open-cluster-management.io/clusterset: gpuaas-clusterset
    vendor: OpenShift              # required by MCO placementrule_controller to enable observability
    cloud: Other                   # required by MCO placementrule_controller
    demo/gpu-type: a30
    demo/gpu-count: "2"
    demo/role: spoke
    demo/server: cluster-b
    environment: gpuaas-demo
spec:
  hubAcceptsClient: true
  leaseDurationSeconds: 60
---
# KlusterletAddonConfig — enables work and addon management on Cluster B
apiVersion: agent.open-cluster-management.io/v1
kind: KlusterletAddonConfig
metadata:
  name: cluster-b
  namespace: cluster-b
spec:
  applicationManager:
    enabled: false
  certPolicyController:
    enabled: false
  iamPolicyController:
    enabled: false
  policyController:
    enabled: false
  searchCollector:
    enabled: true
  workManager:
    enabled: true
