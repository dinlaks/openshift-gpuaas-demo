# Kueue ResourceFlavors — define the GPU tiers available in this cluster.
# This is a template: ${MIG_SMALL_FLAVOR}, ${GPU_TYPE} etc. are substituted
# from env.sh by deploy-kueue.sh (via envsubst). Do not oc apply directly.
#
# Flavors select nodes via capability labels set by 01-node-labels.sh.
# A node can carry multiple capability labels (e.g. mixed node has both
# demo/gpu-has-small-mig=true and demo/gpu-has-large-mig=true), so all
# three flavors can be available simultaneously on different nodes.

# ── Small MIG slice — economy GPU tier ───────────────────────────────────────
# Matches nodes with role: small, mixed, or full-combo
# (all set demo/gpu-has-small-mig=true)
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: ${MIG_SMALL_FLAVOR}
spec:
  nodeLabels:
    demo/gpu-type: ${GPU_TYPE}
    demo/gpu-has-small-mig: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
---
# ── Large MIG slice — premium GPU tier ───────────────────────────────────────
# Matches nodes with role: large or mixed
# (both set demo/gpu-has-large-mig=true)
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: ${MIG_LARGE_FLAVOR}
spec:
  nodeLabels:
    demo/gpu-type: ${GPU_TYPE}
    demo/gpu-has-large-mig: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
---
# ── Full GPU — large model / dedicated tier ────────────────────────────────────
# Matches nodes with role: dedicated or full-combo
# (both set demo/gpu-has-full=true)
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: ${FULL_GPU_FLAVOR}
spec:
  nodeLabels:
    demo/gpu-type: ${GPU_TYPE}
    demo/gpu-has-full: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
