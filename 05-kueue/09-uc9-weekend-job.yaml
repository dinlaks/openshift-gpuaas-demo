# UC9: Time-Based Policy — weekend economy job
# Runs on 1g.6gb MIG slice (6.2GB) — economy tier active on weekends.
# Applied by the gpuaas-weekend-policy CronJob automatically every Friday 6pm.
# Also apply manually for demo: oc apply -f 06-kueue/09-uc9-weekend-job.yaml
# Cleanup:                       oc delete job uc9-inference-weekend -n inference-team-project
apiVersion: batch/v1
kind: Job
metadata:
  name: uc9-inference-weekend
  namespace: inference-team-project
  labels:
    demo/uc: uc9-time-based
    demo/slot: weekend
    kueue.x-k8s.io/queue-name: inference-queue
    kueue.x-k8s.io/priority-class: high-priority
spec:
  parallelism: 1
  completions: 1
  template:
    metadata:
      labels:
        demo/uc: uc9-time-based
        demo/slot: weekend
        kueue.x-k8s.io/queue-name: inference-queue
        kueue.x-k8s.io/priority-class: high-priority
    spec:
      restartPolicy: Never
      containers:
        - name: inference
          image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
          command: [python, -u, -c]
          args:
            - |
              import torch, time, os, socket
              mem = torch.cuda.get_device_properties(0).total_memory / 1e9
              print(f"WEEKEND ECONOMY | Node: {socket.gethostname()} | GPU: {torch.cuda.get_device_name(0)} | VRAM: {mem:.1f}GB")
              print("Running on ECONOMY 1g.6gb MIG slice (6.2GB) -- weekend policy active")
              duration = int(os.getenv('JOB_DURATION_SECS', '1800'))
              for i in range(duration // 5):
                  if i % 12 == 0:
                      print(f"  weekend inference running... {i*5}s elapsed")
                  time.sleep(5)
          env:
            - name: JOB_DURATION_SECS
              value: "1800"
          resources:
            requests:
              nvidia.com/mig-1g.6gb: "1"
            limits:
              nvidia.com/mig-1g.6gb: "1"
